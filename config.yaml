# MUSINSA STANDARD 히어로 봇 — 랭킹봇 설정
# 매시간 정각에 무신사 랭킹 캡처 + 매일 09:00 일일 리포트

bot:
  name: "MUSINSA STANDARD 히어로 봇"
  icon_path: "assets/hero_bot.png"

ranking:
  # SQLite 저장 경로 (hero_bot 기준 상대경로)
  db_path: "data/rankings.db"

  # 무신사 랭킹 섹션 — [전체] 탭 = sectionId 199 + subPan=product
  section_id: 199
  sub_pan: "product"
  top_n: 100

  # 무탠다드 계열 브랜드 키워드
  brand_keywords:
    - "무신사 스탠다드"
    - "무신사 스탠다드 우먼"
    - "무신사 스탠다드 키즈"

  # 히어로 상품 UID 리스트 — 라인별 탭 A열에서 동적 로드
  hero_sheet_id: "1aAYXjJPFgWCJAmZabc_f-f-wF3z492cIeDE-aVlx-HY"

  # 일일 archive 대상 시트 ([브랜드부문] 전략팀 > 3.전략 > 2.히어로 > MUSINSA STANDARD 히어로 랭킹봇)
  archive_sheet_id: "1UqH-pi5YuQrVYpfj74khXSTVbWml1m4YuaKUAnUgzPI"
  # Slack 리포트 제목에 박을 링크 (Long 탭 직링크)
  archive_sheet_url: "https://docs.google.com/spreadsheets/d/1UqH-pi5YuQrVYpfj74khXSTVbWml1m4YuaKUAnUgzPI/edit?gid=476774888#gid=476774888"

  # 스크린샷: rank ≤ threshold 진입 + 그날 best 갱신 시 무신사 랭킹 페이지 풀페이지 캡처 → Drive 업로드.
  # screenshot_folder_id 빈 값/미설정이면 스크린샷 기능 비활성화 (적재만 수행).
  screenshot_threshold: 10
  screenshot_folder_id: "17_YC5TKvrpOdDfokLJZcEIn1hO2xZfzM"
  # 캡처 시 하단을 rank N까지만 보이게 자름 (null/0 = 풀페이지). 모바일/데스크톱 6열 = 2줄 = 12.
  screenshot_crop_to_rank: 12

# 트렌드 레이더 — 전사용 "요즘 뭐가 잘 팔리나" 일일/주간 발행 (무탠 필터 없이 전 브랜드 Top500)
trend:
  top_n: 500
  section_id: 199
  sub_pan: "product"
  # 봇 내부 기억(깃 커밋되는 작은 JSON 스냅샷). 스프레드시트 아님.
  snapshot_dir: "data/trend_snap"
  keep_days: 14
  # "급상승" 판정: 어제 대비 이만큼 이상 순위 오르면 riser
  jump_threshold: 30
  # 신규/급상승 후보를 이 순위 안에서만 집계 (하위권 노이즈 컷)
  top_focus: 300
  # 발행 채널 — 전사 트렌드 채널. 비면 dry 콘솔만.
  slack_channel: "C0BGZHX98F5"

# 히어로 운영 시스템 (IA v0.2 시트 ① 히어로 보드 + 시트 ② 발매분 보드)
# 생성 도구: python -m soo.hero_ops._create_master_sheets
hero_ops:
  master_sheet_id: "1peOtnnLxGpsjkdY9MzEQ3uffiHaXj_3OiABDv1-xDx8"
  sheet1_gid: 0           # ① 히어로 보드 (62컬럼)
  sheet2_gid: 1114429061  # ② 발매분 보드 (23컬럼)
