name: Hourly ranking capture

on:
  schedule:
    # 30분 슬롯 (00, 30) 각각에 3개 시점 trigger 시도 — GitHub schedule 누락 보강.
    # 같은 슬롯에 중복 발화하면 row가 2~3개 들어가지만 집계는 정상 동작 (peak_rank는 min).
    - cron: "7,37 * * * *"
    - cron: "17,47 * * * *"
    - cron: "26,56 * * * *"
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run hourly capture
        env:
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          GOOGLE_OAUTH_TOKEN:       ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          # Hourly는 Slack 발송 안 함 (Daily가 발송)
        run: python run_ranking_hourly.py
