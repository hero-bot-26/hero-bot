name: Hourly ranking capture

on:
  schedule:
    # 시간당 6회 시도 — GitHub schedule 부하/스킵에 대비. 모든 trigger는
    # ranking_hourly 안에서 같은 :00 슬롯으로 정규화되고, has_hour_data로
    # 멱등성 체크 후 첫 성공만 실제 적재. 나머지는 빠르게 종료.
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:  # 외부 cron(cron-job.org 등)에서 GitHub API로 호출

concurrency:
  group: hourly-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run hourly capture
        env:
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          GOOGLE_OAUTH_TOKEN:       ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          # Hourly는 Slack 발송 안 함 (Daily가 발송)
        run: python run_ranking_hourly.py
