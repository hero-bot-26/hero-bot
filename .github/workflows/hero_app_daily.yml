name: Hero master app daily update

# 매일 PLM·실적 구글시트(데이터브릭스 자동출력)를 읽어 app.html 재생성 → hero-master-app에 push → Vercel 재배포.
# 랩탑 무관(클라우드 실행). 데이터브릭스 잡이 새벽에 시트를 채운 뒤 돌도록 스케줄.
#   PLM 잡 06:00 KST · 실적 잡 07:00 KST 시작(전용 클러스터 ~2h, ~09:00 완료) → 여유 두고 10:00 KST 실행.
on:
  schedule:
    - cron: "0 1 * * *"    # 10:00 KST (Databricks 실적 잡 ~09:00 완료 후)
  workflow_dispatch: {}     # 수동 실행 버튼

concurrency:
  group: hero-app-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout hero_bot (생성기)
        uses: actions/checkout@v4

      - name: Checkout hero-master-app (배포 repo)
        uses: actions/checkout@v4
        with:
          repository: hero-bot-26/hero-master-app
          token: ${{ secrets.APP_REPO_PAT }}     # hero-master-app 쓰기 권한 PAT
          path: hero-master-app

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pandas openpyxl        # plm_ingest import용 (requirements 미포함)

      - name: Generate app.html (구글시트 → app.html)
        env:
          GOOGLE_SA_JSON:           ${{ secrets.GOOGLE_SA_JSON }}   # 서비스계정(있으면 우선·토큰만료 없음)
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          GOOGLE_OAUTH_TOKEN:       ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          APP_REPO_PATH:            ${{ github.workspace }}/hero-master-app
        run: python _gen_26fw_heroes.py --sheet

      - name: Commit & push (변경 있을 때만)
        run: |
          cd hero-master-app
          git config user.name  "hero-bot"
          git config user.email "hero-bot@users.noreply.github.com"
          git add public/app.html
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "데이터 갱신 (자동) $(date -u +%Y-%m-%d)"
            git push
          fi

      # 히어로 단계 카운트다운 슬랙 알람 (TEST_ONLY=True → 본인 DM 테스트만).
      # SLACK_BOT_TOKEN 시크릿 없으면 triggers 가 자동 스킵. 실패해도 위 app.html 작업엔 영향 X.
      - name: 히어로 단계 알람 (테스트)
        if: always()           # app.html 생성이 transient 실패해도 알람은 독립 실행
        continue-on-error: true
        env:
          GOOGLE_SA_JSON:           ${{ secrets.GOOGLE_SA_JSON }}
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          GOOGLE_OAUTH_TOKEN:       ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          SLACK_BOT_TOKEN:          ${{ secrets.SLACK_BOT_TOKEN }}
        run: python -m soo.hero_ops.triggers --sheet --send

      # IMC-3 발매 노출 스킴 알람 (뒷단). TEST_ONLY=True → 본인 DM. 앞단과 동일 dedup/토큰.
      - name: IMC 발매 노출 알람 (테스트)
        if: always()
        continue-on-error: true
        env:
          GOOGLE_SA_JSON:           ${{ secrets.GOOGLE_SA_JSON }}
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          GOOGLE_OAUTH_TOKEN:       ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          SLACK_BOT_TOKEN:          ${{ secrets.SLACK_BOT_TOKEN }}
        run: python -m soo.hero_ops.imc_triggers --send

      # 갱신 실패 시 슬랙 DM 알림 — 토큰 만료/시트 권한·구조 문제로 조용히 멈추는 것 방지.
      - name: 실패 알림 (슬랙 DM)
        if: failure()
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python -m soo.hero_ops.notify "⚠️ 히어로 마스터앱 daily 갱신 실패 ($(date -u +%Y-%m-%d)) — Actions 로그 확인. 단골 원인: GOOGLE_OAUTH_TOKEN 만료(→서비스계정 전환 권장) / 시트 권한 / 시트 구조 변경."
