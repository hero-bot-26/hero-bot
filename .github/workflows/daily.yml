name: Daily ranking report

on:
  # GitHub 네이티브 schedule cron 제거됨 (2026-06-15).
  # 사유: 위 cron(KST 09:00~10:00 의도)이 GitHub 스케줄러 백로그로 3~6시간 밀려
  #       오후(11:48~14:58 KST)에 몰려 발화 → 일일 리포트가 [여자] 뷰 중복 발송되던 문제.
  # 정시(09:00 KST) 발송은 외부 cron(cron-job.org)이 workflow_dispatch 로 호출한다.
  workflow_dispatch:
    inputs:
      as_of:
        description: "대상 날짜 (YYYY-MM-DD, 기본 어제)"
        required: false
        default: ""
      dry_run:
        description: "Slack 발송 안 함 (true/false)"
        required: false
        default: "false"
      force:
        description: "이미 발송됐어도 재발송 (true/false)"
        required: false
        default: "false"

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          GOOGLE_OAUTH_TOKEN:       ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          SLACK_BOT_TOKEN:          ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_TARGET:             ${{ secrets.SLACK_TARGET }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.as_of }}" ]; then
            ARGS="$ARGS --as-of ${{ github.event.inputs.as_of }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python run_ranking_daily.py $ARGS
